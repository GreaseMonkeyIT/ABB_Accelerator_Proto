# L4 API gateway (P6) — frontend-agnostic REST over L2/L3. Deployed to ns aiops.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: aiops
  labels: { app: api, tier: aiops }
spec:
  replicas: 1
  selector: { matchLabels: { app: api } }
  template:
    metadata:
      labels: { app: api, tier: aiops }
    spec:
      containers:
        - name: api
          image: skn/api:v0.1
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8088 }]
          env:
            - { name: ENGINE_URL,     value: "http://correlation-engine.aiops.svc:9100" }
            - { name: AGGREGATOR_URL, value: "http://aggregator.aiops.svc:9000" }
            - { name: COOLING_URL,    value: "http://cooling-monitor.factory-data.svc:8080" }
          readinessProbe:
            httpGet: { path: /healthz, port: 8088 }
            initialDelaySeconds: 3
          resources:
            requests: { cpu: 50m,  memory: 96Mi }
            limits:   { cpu: 250m, memory: 192Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: aiops
  labels: { app: api }
spec:
  selector: { app: api }
  ports: [{ name: http, port: 8088, targetPort: 8088 }]
